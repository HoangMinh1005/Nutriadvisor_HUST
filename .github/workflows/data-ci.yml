name: Data CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'data/**'
      - 'backend/**'
      - 'tests/**'
      - 'requirements*.txt'
      - '.github/workflows/data-ci.yml'
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  DATABASE_URL: postgresql://nutri_user:minhdt@localhost:5432/nutri_advisor

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-test.txt
          pip install flake8 black isort

      - name: Run black (code formatting)
        run: black --check data/ backend/ tests/ || echo "Some files need formatting"

      - name: Run isort (import sorting)
        run: isort --check-only data/ backend/ tests/ || echo "Some imports need sorting"

      - name: Run flake8 (linting)
        run: |
          flake8 data/scripts backend/ tests/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=migrations

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests
        run: |
          pytest tests/unit -v \
            --cov=data \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload unit test coverage
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-unit-tests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: nutri_user
          POSTGRES_PASSWORD: minhdt
          POSTGRES_DB: nutri_advisor
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-test.txt

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          python data/scripts/run_migrations.py

      - name: Load structured data to DB
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          python data/scripts/load_structured_to_db.py \
            --version-tag v1.1.0

      - name: Run integration tests
        run: |
          pytest tests/integration/test_database.py tests/integration/test_feature_store_integration.py -v \
            --cov=data \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload integration test coverage
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage.xml
          flags: integration
          name: codecov-integration-tests

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: nutri_user
          POSTGRES_PASSWORD: minhdt
          POSTGRES_DB: nutri_advisor
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-test.txt

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          python data/scripts/run_migrations.py

      - name: Load structured data to DB
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          python data/scripts/load_structured_to_db.py \
            --version-tag v1.1.0

      - name: Start FastAPI backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run smoke test - Database connectivity
        run: |
          python -c "
          import psycopg
          conn = psycopg.connect('postgresql://nutri_user:minhdt@localhost:5432/nutri_advisor')
          result = conn.execute('SELECT COUNT(*) FROM foods').fetchone()
          assert result[0] > 0, 'No foods in database'
          print(f'✅ Database: {result[0]} foods loaded')
          "

      - name: Run smoke test - API health check
        run: |
          python -c "
          import httpx
          import time
          time.sleep(2)
          client = httpx.Client()
          response = client.get('http://localhost:8000/health')
          assert response.status_code == 200, f'Health check failed: {response.status_code}'
          print('✅ API health check passed')
          "

      - name: Run API integration tests
        run: |
          pytest tests/integration/test_api_search.py -v

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, smoke-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Summarize coverage status
        run: |
          echo "Coverage is uploaded directly by the test jobs via Codecov."
          echo "This job only reports overall pipeline status."

      - name: Comment PR with coverage
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request' && needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success' && needs.smoke-tests.result == 'success'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ CI Pipeline Complete\n- Lint: Passed\n- Unit Tests: Passed\n- Integration Tests: Passed\n- Smoke Tests: Passed'
            })

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, smoke-tests]
    if: success()
    steps:
      - name: Print success message
        run: |
          echo "✅ All CI checks passed!"
          echo "Ready to deploy to staging/production"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, smoke-tests]
    if: failure()
    steps:
      - name: Print failure message
        run: |
          echo "❌ CI pipeline failed"
          echo "Please check logs and fix issues"
